name: Pi Agent

on:
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  pi-agent:
    if: >-
      ${{
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/pi')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '/pi')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/pi'))
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run Pi agent
        uses: https://github.com/shaftoe/pi-coding-agent-action@v2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          provider: zai
          model: glm-5.1
          token: ${{ secrets.ZAI_API_KEY }}
          thinking_level: high
