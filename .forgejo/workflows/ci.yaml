name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  nix-check:
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Check formatting
        run: nix fmt -- --check .

      - name: Run all flake checks
        run: nix flake check --all-systems --keep-going

      - name: Build all NixOS configurations
        run: |
          nix build .#nixosConfigurations.backbone-01.config.system.build.toplevel
          nix build .#nixosConfigurations.backbone-02.config.system.build.toplevel
          nix build .#nixosConfigurations.frontline-01.config.system.build.toplevel
          nix build .#nixosConfigurations.frontline-02.config.system.build.toplevel

  git-cliff-k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Enforce k8s conventional scopes
        run: ./scripts/check-k8s-git-cliff.sh

      - name: Generate unreleased changelog preview
        run: |
          nix run nixpkgs#git-cliff -- \
            --config cliff.toml \
            --workdir . \
            --unreleased \
            --output CHANGELOG_PREVIEW.md

      - name: Show changelog preview path
        run: ls -l CHANGELOG_PREVIEW.md

  chart-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Build Helm charts from flake outputs
        run: |
          nix build .#helmCharts.x86_64-linux.argocd --out-link argocd-chart
          nix build .#helmCharts.x86_64-linux.forgejo --out-link forgejo-chart

      - name: Validate chart archive contents
        run: |
          ls -l argocd-chart
          ls -l forgejo-chart
          test -f argocd-chart
          test -f forgejo-chart

  publish-helm:
    needs: [ nix-check, git-cliff-k8s, chart-validation ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Build Helm charts
        run: |
          nix build .#helmCharts.x86_64-linux.argocd --out-link argocd-chart
          nix build .#helmCharts.x86_64-linux.forgejo --out-link forgejo-chart

      - name: Publish chart packages to Forgejo registry
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_URL: https://forge.quadtech.dev
          ORG_NAME: quadnix
        run: |
          curl -fS -u "${{ github.actor }}:$FORGEJO_TOKEN" -X POST "$FORGEJO_URL/api/packages/$ORG_NAME/helm" \
            -F "file=@argocd-chart"
          curl -fS -u "${{ github.actor }}:$FORGEJO_TOKEN" -X POST "$FORGEJO_URL/api/packages/$ORG_NAME/helm" \
            -F "file=@forgejo-chart"

      - name: Build Helm repository index
        run: |
          mkdir -p dist
          cp argocd-chart dist/
          cp forgejo-chart dist/
          nix shell nixpkgs#kubernetes-helm -c helm repo index dist --url "https://forge.quadtech.dev/api/packages/quadnix/helm"

      - name: Show index path
        run: ls -l dist/index.yaml

  deploy-backbone-01:
    needs: [ nix-check, git-cliff-k8s, chart-validation ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Deploy backbone-01
        run: nix run github:serokell/deploy-rs -- .#backbone-01 --skip-checks
