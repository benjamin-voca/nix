name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ── 1. Test: nix flake check (unit tests, formatting, kubeconform, conftest) ──
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Check formatting
        run: nix fmt -- --check .

      - name: Run all flake checks
        run: nix flake check --all-systems --keep-going

      - name: Build all NixOS configurations
        run: |
          nix build .#nixosConfigurations.backbone-01.config.system.build.toplevel
          nix build .#nixosConfigurations.backbone-02.config.system.build.toplevel
          nix build .#nixosConfigurations.frontline-01.config.system.build.toplevel
          nix build .#nixosConfigurations.frontline-02.config.system.build.toplevel

  # ── 2. Validate: build bootstrap manifests + diff against reference ──
  validate-manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Build bootstrap manifests
        run: |
          nix build .#bootstrap.x86_64-linux

      - name: Validate manifests with kubeconform
        run: |
          nix shell nixpkgs#kubeconform -c \
            kubeconform -summary -strict -ignore-missing-schemas -kubernetes-version 1.29.0 \
            result/bootstrap.yaml

      - name: Diff bootstrap against committed reference
        run: |
          if [ -f docs/reference-bootstrap.yaml ]; then
            nix shell nixpkgs#difftastic -c \
              diff --unified=5 docs/reference-bootstrap.yaml result/bootstrap.yaml || {
                echo ""
                echo "::warning::Bootstrap manifests differ from docs/reference-bootstrap.yaml"
                echo "If this is intentional, update the reference:"
                echo "  cp result/bootstrap.yaml docs/reference-bootstrap.yaml"
                echo ""
                # Don't fail the pipeline on diff — just warn.
                # The diff is informational for PR review.
              }
          else
            echo "No reference bootstrap found at docs/reference-bootstrap.yaml"
            echo "Generate one with: cp result/bootstrap.yaml docs/reference-bootstrap.yaml"
          fi

      - name: Upload bootstrap artifacts
        uses: code.forgejo.org/actions/upload-artifact@v4
        if: always()
        with:
          name: bootstrap-manifests
          path: result/
          retention-days: 7

  # ── 3. Chart validation & changelog ──
  chart-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Build Helm charts from flake outputs
        run: |
          nix build .#helmCharts.x86_64-linux.argocd --out-link argocd-chart
          nix build .#helmCharts.x86_64-linux.forgejo --out-link forgejo-chart

      - name: Validate chart archive contents
        run: |
          ls -l argocd-chart
          ls -l forgejo-chart
          test -f argocd-chart
          test -f forgejo-chart

      - name: Enforce k8s conventional scopes
        run: ./scripts/check-k8s-git-cliff.sh

      - name: Generate unreleased changelog preview
        run: |
          nix run nixpkgs#git-cliff -- \
            --config cliff.toml \
            --workdir . \
            --unreleased \
            --output CHANGELOG_PREVIEW.md

      - name: Show changelog preview path
        run: ls -l CHANGELOG_PREVIEW.md

  # ── 4. Publish Helm charts (main only, after all checks pass) ──
  publish-helm:
    needs: [ test, validate-manifests, chart-validation ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      - name: Build Helm charts
        run: |
          nix build .#helmCharts.x86_64-linux.argocd --out-link argocd-chart
          nix build .#helmCharts.x86_64-linux.forgejo --out-link forgejo-chart

      - name: Publish chart packages to Forgejo registry
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          FORGEJO_URL: https://forge.quadtech.dev
          ORG_NAME: quadnix
        run: |
          curl -fS -u "${{ github.actor }}:$FORGEJO_TOKEN" -X POST "$FORGEJO_URL/api/packages/$ORG_NAME/helm" \
            -F "file=@argocd-chart"
          curl -fS -u "${{ github.actor }}:$FORGEJO_TOKEN" -X POST "$FORGEJO_URL/api/packages/$ORG_NAME/helm" \
            -F "file=@forgejo-chart"

      - name: Build Helm repository index
        run: |
          mkdir -p dist
          cp argocd-chart dist/
          cp forgejo-chart dist/
          nix shell nixpkgs#kubernetes-helm -c helm repo index dist --url "https://forge.quadtech.dev/api/packages/quadnix/helm"

      - name: Show index path
        run: ls -l dist/index.yaml

  # ── 5. CD: Deploy NixOS + Bootstrap + Trigger ArgoCD Sync ──
  deploy:
    needs: [ test, validate-manifests, chart-validation ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: code.forgejo.org/actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        run: |
          if command -v nix >/dev/null 2>&1; then
            nix --version
          else
            curl -fsSL https://nixos.org/nix/install | sh -s -- --no-daemon --yes
            . "$HOME/.nix-profile/etc/profile.d/nix.sh"
            nix --version
          fi

      - name: Configure Nix
        run: |
          mkdir -p "$HOME/.config/nix"
          {
            echo "experimental-features = nix-command flakes"
            echo "accept-flake-config = true"
          } >> "$HOME/.config/nix/nix.conf"

      # ── Step A: Build bootstrap manifests ──
      - name: Build bootstrap manifests
        run: nix build .#bootstrap.x86_64-linux

      # ── Step B: Apply bootstrap to Kubernetes ──
      - name: Apply bootstrap manifests
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_BASE64 }}
        run: |
          # Decode kubeconfig from base64 secret
          echo "$KUBECONFIG_B64" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          chmod 600 /tmp/kubeconfig

          # Apply all bootstrap manifests with server-side apply
          nix shell nixpkgs#kubectl -c bash -c '
            kubectl apply \
              --server-side \
              --field-manager=quadnix-ci \
              --force-conflicts \
              -f result/bootstrap.yaml
          '

      # ── Step C: Trigger ArgoCD sync for all Applications ──
      - name: Trigger ArgoCD sync
        env:
          KUBECONFIG: /tmp/kubeconfig
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_API_TOKEN }}
        run: |
          # ArgoCD server is reachable via cluster IP from the runner
          ARGOCD_URL="http://10.0.0.171"

          # Get all ArgoCD Application names
          APPS=$(nix shell nixpkgs#kubectl -c kubectl get applications -n argocd -o jsonpath='{.items[*].metadata.name}')

          if [ -z "$APPS" ]; then
            echo "No ArgoCD Applications found, skipping sync"
            exit 0
          fi

          echo "Triggering ArgoCD sync for: $APPS"

          for APP in $APPS; do
            echo "Syncing $APP..."
            # Trigger sync via ArgoCD API
            HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $ARGOCD_TOKEN" \
              -H "Content-Type: application/json" \
              "${ARGOCD_URL}/api/v1/applications/${APP}/sync")
            
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "  ✓ $APP sync triggered (HTTP $HTTP_CODE)"
            else
              echo "  ✗ $APP sync failed (HTTP $HTTP_CODE)"
            fi
          done

      # ── Step D: Deploy NixOS to backbone-01 ──
      - name: Deploy backbone-01 via deploy-rs
        run: nix run github:serokell/deploy-rs -- .#backbone-01 --skip-checks
