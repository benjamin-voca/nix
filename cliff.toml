[changelog]
header = "# Changelog\n\n"
body = """
{% for group, commits in commits | group_by(attribute=\"group\") %}
## {{ group }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}
{% endfor %}
{% endfor %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
commit_preprocessors = [
  { pattern = "^Merged PR #[0-9]+: ", replace = "" },
]
commit_parsers = [
  { message = "^feat\\(k8s\\)", group = "Features" },
  { message = "^feat\\((argocd|harbor|erpnext|helm)\\)", group = "Features" },
  { message = "^fix\\(k8s\\)", group = "Bug Fixes" },
  { message = "^fix\\((argocd|harbor|erpnext|helm)\\)", group = "Bug Fixes" },
  { message = "^refactor\\(k8s\\)", group = "Refactors" },
  { message = "^docs\\(k8s\\)", group = "Documentation" },
  { message = "^chore\\((k8s|argocd|harbor|erpnext|helm)\\)", group = "Chores" },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "^v[0-9]+\\.[0-9]+\\.[0-9]+$"
skip_tags = "v0.0.0"
topological_order = false
sort_commits = "oldest"
