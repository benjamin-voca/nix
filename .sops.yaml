# SOPS Configuration for QuadNix
#
# This file defines which keys can decrypt which secrets.
# Supports both age keys (for hosts) and SSH keys (for users).
# Public keys are safe to commit to git.

keys:
  # SSH keys for users who can decrypt (from modules/profiles/base.nix)
  - &benjamin ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAILaEuHKb7PS/LyaBxvNzIcVzMOW0aDVHFnauM9pSjxm8
  - &klajdi ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINQisXyPG28p3bjlL6slxTsZWdQRDBcIq0eKf388kjJk
  - &erti ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIDIjDVRgzc2UBRIbtwysmmW/F+zOjLm4PhmmKeYASoZK
  - &elion ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINxZcBLleNnJ8BXX7+3jA3xROZjlz3C5dM76VTsy/sLh

  # Backbone hosts (age keys)
  - &backbone-01 age149k446qw7jhxszqs40y09a2n22um3056geunqm2mypg8e7dehgvsyn4ude

creation_rules:
  # Backbone-01 specific secrets
  - path_regex: secrets/backbone-01\.yaml$
    key_groups:
      - age:
          - *backbone-01
      - ssh:
          - *benjamin
          - *klajdi
          - *erti
          - *elion

  # Backbone-02 specific secrets
  # - path_regex: secrets/backbone-02\.yaml$
