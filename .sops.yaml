  #     - *benjamin
  #     - *klajdi
  #     - *erti
  #     - *elion

  # Shared backbone secrets (both hosts can decrypt)
  - path_regex: secrets/backbone-shared\.yaml$
    key_groups:
      - age:
          - *backbone-01
          # - *backbone-02
      - ssh:
          - *benjamin
          - *klajdi
          - *erti
          - *elion

  # Frontline-01 specific secrets
  # - path_regex: secrets/frontline-01\.yaml$
