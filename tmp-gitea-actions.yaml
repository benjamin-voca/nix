apiVersion: v1
kind: ServiceAccount
metadata:
  name: gitea-actions
  namespace: gitea
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gitea-actions
  namespace: gitea
spec:
  serviceName: gitea-actions
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gitea-actions
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gitea-actions
    spec:
      serviceAccountName: gitea-actions
      containers:
      - name: act-runner
        image: docker.gitea.com/act_runner:0.2.13
        env:
        - name: GITEA_INSTANCE_URL
          value: https://gitea.quadtech.dev
        - name: GITEA_RUNNER_TOKEN
          valueFrom:
            secretKeyRef:
              name: gitea-runner-token
              key: token
        - name: GITEA_RUNNER_LABELS
          value: ubuntu-latest,linux,x86_64,self-hosted
        - name: GITEA_RUNNER_NAME
          value: k8s-runner
        - name: DOCKER_HOST
          value: tcp://localhost:2375
        command: ["/bin/sh", "-c"]
        args:
        - "cd /data && cat > config.yaml << 'EOF'\nrunner:\n  name: k8s-runner\n  url: https://gitea.quadtech.dev\n  token: $GITEA_RUNNER_TOKEN\n  labels:\n    - ubuntu-latest\n    - linux\n    - x86_64\n    - self-hosted\ndocker:\n  host: tcp://localhost:2375\nEOF\nif [ ! -f .runner ]; then\n  act_runner register --instance $GITEA_INSTANCE_URL --token $GITEA_RUNNER_TOKEN --name $GITEA_RUNNER_NAME --labels $GITEA_RUNNER_LABELS --no-interactive\nfi\nact_runner daemon --config config.yaml"
        volumeMounts:
        - name: runner-data
          mountPath: /data
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      - name: dind
        image: docker:28.3.3-dind
        args:
        - dockerd
        - --host=tcp://0.0.0.0:2375
        ports:
        - containerPort: 2375
        securityContext:
          privileged: true
        volumeMounts:
        - name: runner-data
          mountPath: /var/lib/docker
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 2000m
            memory: 2Gi
      volumes:
      - name: runner-data
        emptyDir: {}
